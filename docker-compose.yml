version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: airiq-db
    environment:
      POSTGRES_DB: airiq
      POSTGRES_USER: airiq
      POSTGRES_PASSWORD: airiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airiq -d airiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: airiq-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: airiq-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://airiq:airiq@db:5432/airiq
      JWT_SECRET: airiq-production-super-secret-at-least-32-chars
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      AI_PROVIDER: local
      DISABLE_JOBS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "node dist/migrate.js && node dist/seed.js && node dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000/api/v1
    container_name: airiq-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
